<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATHENA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #e6e6e6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .user {
            color: #7cc7ff;
        }

        .athena {
            color: #9cffb1;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #222;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            background: #1a1d24;
            color: white;
            border-radius: 6px;
        }

        button {
            margin-left: 10px;
            padding: 12px 16px;
            background: #2b6cff;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1f55cc;
        }

        footer {
            text-align: center;
            font-size: 11px;
            padding: 8px;
            opacity: 0.6;
            border-top: 1px solid #222;
        }
    </style>
</head>

<body>

<header>
    ATHENA
    <div class="subtitle">
        Archaeological Research & Heritage Expert Network Assistant
    </div>
</header>

<div id="chat"></div>

<div class="input-box">
    <input id="msg" placeholder="Ask Athena..." />
    <button onclick="send()">Ask</button>
</div>

<footer>
    Powered by OpenAI & Archeo.news
</footer>

<script>
async function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();

    chat.innerHTML += `<div class="msg athena">ATHENA: ${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
