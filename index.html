<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1115;
    color: white;
}

header {
    padding: 18px;
    text-align: center;
    border-bottom: 1px solid #222;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.tab {
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 6px;
    background: #1a1d24;
}

.tab.active {
    background: #2b6cff;
}

.container {
    display: flex;
    height: calc(100vh - 120px);
}

.panel {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.hidden {
    display: none;
}

input {
    width: 80%;
    padding: 10px;
    border: none;
    border-radius: 6px;
}

button {
    padding: 10px;
    background: #2b6cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.msg {
    margin: 8px 0;
}

.user { color: #7cc7ff; }
.bot { color: #9cffb1; }

.article {
    background: #1a1d24;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h2>ATHENA</h2>
    <div style="opacity:0.6;font-size:12px;">
        Archaeological Research & Heritage Expert Network Assistant
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('chat')">Chat</div>
        <div class="tab" onclick="showTab('news')">ArcheoNews</div>
    </div>
</header>

<!-- CHAT -->
<div id="chatTab" class="container">
    <div class="panel">
        <div id="chat"></div>

        <input id="msg" placeholder="Ask Athena..." />
        <button onclick="send()">Ask</button>
    </div>
</div>

<!-- NEWS -->
<div id="newsTab" class="container hidden">
    <div class="panel">
        <input id="newsQuery" placeholder="Search archaeology topics..." />
        <button onclick="loadNews()">Search</button>

        <div id="articles"></div>
    </div>
</div>

<footer style="text-align:center;padding:10px;opacity:0.5;border-top:1px solid #222;">
    Powered by OpenAI & Archeo.news
</footer>

<script>
function showTab(tab) {
    document.getElementById("chatTab").classList.add("hidden");
    document.getElementById("newsTab").classList.add("hidden");

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

    if (tab === "chat") {
        document.getElementById("chatTab").classList.remove("hidden");
        document.querySelectorAll(".tab")[0].classList.add("active");
    } else {
        document.getElementById("newsTab").classList.remove("hidden");
        document.querySelectorAll(".tab")[1].classList.add("active");
    }
}

/* CHAT */
async function send() {
    let input = document.getElementById("msg");
    let text = input.value;
    if (!text) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();

    chat.innerHTML += `<div class="msg bot">ATHENA: ${data.reply}</div>`;
}

/* NEWS */
async function loadNews() {
    let q = document.getElementById("newsQuery").value;

    let res = await fetch("/news?q=" + encodeURIComponent(q));
    let data = await res.json();

    let div = document.getElementById("articles");
    div.innerHTML = "";

    data.articles.forEach(a => {
        div.innerHTML += `
        <div class="article">
            <b>${a.title}</b><br>
            <small>${a.year}</small><br>
            <a href="${a.url}" target="_blank">source</a>
        </div>`;
    });
}
</script>

</body>
</html>
