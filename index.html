<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CENTER LAYOUT */
.container {
    width: 100%;
    max-width: 700px;
    text-align: center;
    padding: 20px;
}

h1 {
    font-weight: 400;
    margin-bottom: 5px;
    letter-spacing: 2px;
}

.sub {
    color: #666;
    margin-bottom: 30px;
    font-size: 14px;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 12px;
    outline: none;
}

input:focus {
    border-color: #5c839a;
}

/* BUTTON BLUE */
button {
    width: 100%;
    padding: 14px;
    border: none;
    background: #5c839a;
    color: white;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    background: #4f7388;
}

/* RESPONSE */
#response {
    margin-top: 25px;
    text-align: left;
    white-space: pre-line;
    line-height: 1.6;
    font-size: 14px;
    color: #222;
}

/* NEWS */
#news {
    display: none; /* invisible pour l'instant comme demandé */
}
</style>
</head>

<body>

<div class="container">

    <h1>ATHENA</h1>
    <div class="sub">Archaeological Research Assistant</div>

    <input id="input" placeholder="Ask anything...">
    <button onclick="ask()">ASK ANYTHING</button>

    <div id="response"></div>

    <div id="news"></div>

</div>

<script>

async function ask() {
    const message = document.getElementById("input").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();

    // REFERENCES INVISIBLES (comme demandé)
    document.getElementById("response").innerText = data.reply;
}

</script>

</body>
</html>
