<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

.container {
    max-width: 850px;
    margin: auto;
    padding: 60px 20px;
}

h1 {
    font-weight: 500;
    margin-bottom: 5px;
}

.sub {
    color: #666;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 10px;
}

button {
    padding: 12px 18px;
    border: none;
    background: #111;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

#response {
    margin-top: 30px;
    white-space: pre-line;
    line-height: 1.6;
}

.section-title {
    margin-top: 60px;
    font-size: 12px;
    color: #888;
    letter-spacing: 2px;
}

.news-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

    <h1>ATHENA</h1>
    <div class="sub">Archaeological Research Assistant</div>

    <input id="input" placeholder="Ask anything...">
    <button onclick="ask()">ASK ANYTHING</button>

    <div id="response"></div>

    <div class="section-title">ARCHEO NEWS</div>
    <div id="news">Loading...</div>

</div>

<script>

async function ask() {
    const message = document.getElementById("input").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();

    document.getElementById("response").innerText = data.reply;
}

async function loadNews() {
    const res = await fetch("/news");
    const data = await res.json();

    let html = "";

    data.forEach(n => {
        html += `
        <div class="news-item">
            <b>${n.title}</b><br>
            <small>${n.year}</small><br>
            <a href="${n.url}" target="_blank">${n.url}</a>
        </div>`;
    });

    document.getElementById("news").innerHTML = html;
}

loadNews();

</script>

</body>
</html>
