<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-weight: 400;
    letter-spacing: 2px;
}

.sub {
    color: #888;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 10px;
    background: #1a1d24;
    color: white;
}

button {
    padding: 12px 20px;
    border: none;
    background: #3b82f6;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.card {
    margin-top: 20px;
    padding: 15px;
    background: #161922;
    border-radius: 8px;
    white-space: pre-line;
}

.section-title {
    margin-top: 40px;
    font-size: 13px;
    color: #888;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="container">

    <h1>ATHENA</h1>
    <div class="sub">Archaeological Research Assistant</div>

    <input id="input" placeholder="Ask anything about archaeology...">
    <button onclick="ask()">ASK</button>

    <div id="response" class="card"></div>

    <div class="section-title">ARCHEO NEWS</div>
    <div id="news" class="card">Loading ArcheoNews...</div>

</div>

<script>

async function ask() {
    const message = document.getElementById("input").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();

    document.getElementById("response").innerText =
        data.reply + "\n\nREFERENCES:\n" + data.references;
}

async function loadNews() {
    try {
        const res = await fetch("https://api.allorigins.win/raw?url=https://www.archaeology.org/news");
        const text = await res.text();

        document.getElementById("news").innerText =
            "ArcheoNews feed loaded.\n\n(Next: structured timeline + filters)";
    } catch (e) {
        document.getElementById("news").innerText =
            "ArcheoNews temporarily unavailable";
    }
}

loadNews();

</script>

</body>
</html>
