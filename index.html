<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATHENA</title>

<style>

body{

    margin:0;
    padding:0;

    background:#faf9f7;

    color:#222;

    font-family:Georgia, serif;

}

.wrapper{

    max-width:900px;
    margin:auto;

    padding:70px 30px;

}

h1{

    text-align:center;

    font-size:58px;

    font-weight:400;

    letter-spacing:6px;

    margin-bottom:8px;

}

.subtitle{

    text-align:center;

    color:#777;

    letter-spacing:2px;

    font-size:15px;

    margin-bottom:70px;

}

textarea{

    width:100%;

    height:130px;

    border:none;

    border-bottom:1px solid #ddd;

    resize:none;

    outline:none;

    background:transparent;

    font-size:18px;

    font-family:Georgia, serif;

    padding:12px 0;

}

button{

    display:block;

    margin:45px auto;

    padding:14px 44px;

    border:1px solid #222;

    background:white;

    cursor:pointer;

    font-size:16px;

    letter-spacing:2px;

    transition:.25s;

}

button:hover{

    background:#222;

    color:white;

}

#response{

    margin-top:70px;

    line-height:1.8;

    font-size:18px;

}

#references{

    margin-top:50px;

    font-size:15px;

    color:#666;

    line-height:1.6;

}

.footer{

    margin-top:120px;

    text-align:center;

    color:#999;

    font-size:13px;

}

</style>

</head>

<body>

<div class="wrapper">

<h1>ATHENA</h1>

<div class="subtitle">
Archaeological Research Assistant
</div>

<textarea
id="question"
placeholder="Ask ATHENA..."></textarea>

<button onclick="askAthena()">
Ask
</button>

<div id="response"></div>

<div id="references"></div>

<div class="footer">
Powered by OpenAI and Archaeo.news
</div>

</div>

<script>

async function askAthena(){

const question=document.getElementById("question").value;

const response=document.getElementById("response");

const references=document.getElementById("references");

response.innerHTML="Thinking...";

references.innerHTML="";

const r=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:question

})

});

const data=await r.json();

response.innerHTML=data.reply;

if(data.references){

references.innerHTML="<br><strong>References</strong><br><br>"+data.references;

}

}

</script>

</body>

</html>
