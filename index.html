<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATHENA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

.container {
    max-width: 850px;
    margin: auto;
    padding: 50px 20px;
}

h1 {
    font-weight: 500;
    letter-spacing: 1px;
}

.sub {
    color: #666;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 6px;
    margin-bottom: 10px;
}

button {
    padding: 12px 18px;
    border: none;
    background: #111;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

#response {
    margin-top: 25px;
    white-space: pre-line;
    line-height: 1.6;
}

.section-title {
    margin-top: 50px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">

    <h1>ATHENA</h1>
    <div class="sub">Archaeological Research Assistant</div>

    <input id="input" placeholder="Ask anything...">
    <button onclick="ask()">ASK ANYTHING</button>

    <div id="response"></div>

    <div class="section-title">ARCHEO NEWS</div>
    <div id="news">Loading...</div>

</div>

<script>

async function ask() {
    const message = document.getElementById("input").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();

    document.getElementById("response").innerText =
        data.reply + "\n\nREFERENCES:\n" + data.references;
}

async function loadNews() {
    document.getElementById("news").innerText =
        "ArcheoNews initializing... (seed needed)";
}

loadNews();

</script>

</body>
</html>
